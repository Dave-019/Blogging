<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Comedy Radio</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #0c0c0e;
  --bg2: #131316;
  --bg3: #1a1a1f;
  --bg4: #222228;
  --text: #e8e6e3;
  --text2: #a09b93;
  --text3: #5a5650;
  --border: #2a2a30;
  --border2: #3a3a42;
  --accent: #c5a55a;
  --accent2: #a88c3a;
  --accent-dim: rgba(197,165,90,0.1);
  --accent-glow: rgba(197,165,90,0.25);
  --red: #c44040;
  --red-dim: rgba(196,64,64,0.15);
  --warm: #e8c88a;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Space Grotesk', sans-serif;
  font-size: 14px;
  min-height: 100vh;
  min-height: 100dvh;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 0;
}

.page {
  position: relative;
  z-index: 1;
  max-width: 1020px;
  margin: 0 auto;
  padding: 48px 32px 80px;
  display: grid;
  grid-template-columns: 310px 1fr;
  gap: 56px;
  align-items: start;
}

/* ── LEFT ── */
.left {
  position: sticky;
  top: 32px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.radio-wrap {
  position: relative;
  width: 100%;
  max-width: 310px;
  user-select: none;
}

#radioSvg {
  width: 100%;
  display: block;
  filter: drop-shadow(0 20px 50px rgba(0,0,0,0.5));
  transition: filter 0.6s ease;
}

#radioSvg.on {
  filter: drop-shadow(0 20px 50px rgba(0,0,0,0.5)) drop-shadow(0 0 30px rgba(197,165,90,0.2));
  animation: float 5s ease-in-out infinite;
}

@keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-4px)} }

#dialGroup { cursor: grab; }
#dialGroup:active { cursor: grabbing; }
#playHitArea, #stopHitArea { cursor: pointer; }

/* ── STATUS PANEL ── */
.status-panel {
  width: 100%;
  margin-top: 20px;
  background: var(--bg2);
  border-radius: 12px;
  padding: 18px 20px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  border: 1px solid var(--border);
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.02);
}

.status-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.status-label {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--text3);
  transition: color 0.3s;
}

.status-label.active { color: var(--accent2); }

.status-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--border);
  transition: all 0.3s;
}

.status-dot.on {
  background: var(--accent);
  box-shadow: 0 0 6px var(--accent), 0 0 14px var(--accent-glow);
  animation: pulse 2.5s ease-in-out infinite;
}

.status-dot.loading {
  background: var(--warm);
  box-shadow: 0 0 6px var(--warm);
  animation: pulse 0.6s ease-in-out infinite;
}

.status-dot.error {
  background: var(--red);
  box-shadow: 0 0 6px var(--red);
}

@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.35} }

.station-display {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 14px;
  font-weight: 600;
  color: var(--accent);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  min-height: 20px;
  transition: color 0.3s;
}

.station-display.off { color: var(--text3); }
.station-display.loading { color: var(--warm); }

.timer-display {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  color: var(--text3);
  letter-spacing: 0.1em;
  min-height: 14px;
  transition: color 0.3s;
}

.timer-display.on { color: var(--text2); }

/* EQ bars */
.eq-row {
  display: flex;
  align-items: flex-end;
  gap: 2px;
  height: 24px;
  padding: 2px 0;
}

.eq-b {
  flex: 1;
  height: 2px;
  background: var(--accent);
  border-radius: 1px;
  opacity: 0.1;
  transition: height 0.08s ease, opacity 0.3s;
}

.eq-row.on .eq-b { opacity: 1; }
.eq-row.on .eq-b:nth-child(1) { animation: eq .8s ease-in-out infinite; }
.eq-row.on .eq-b:nth-child(2) { animation: eq .65s ease-in-out .1s infinite; }
.eq-row.on .eq-b:nth-child(3) { animation: eq 1s ease-in-out .05s infinite; }
.eq-row.on .eq-b:nth-child(4) { animation: eq .75s ease-in-out .2s infinite; }
.eq-row.on .eq-b:nth-child(5) { animation: eq .9s ease-in-out .12s infinite; }
.eq-row.on .eq-b:nth-child(6) { animation: eq .7s ease-in-out .07s infinite; }
.eq-row.on .eq-b:nth-child(7) { animation: eq .85s ease-in-out .15s infinite; }
.eq-row.on .eq-b:nth-child(8) { animation: eq .6s ease-in-out .22s infinite; }
.eq-row.on .eq-b:nth-child(9) { animation: eq .78s ease-in-out .18s infinite; }
.eq-row.on .eq-b:nth-child(10) { animation: eq .68s ease-in-out .08s infinite; }
.eq-row.on .eq-b:nth-child(11) { animation: eq .92s ease-in-out .14s infinite; }
.eq-row.on .eq-b:nth-child(12) { animation: eq .72s ease-in-out .25s infinite; }

@keyframes eq { 0%,100%{height:2px} 50%{height:20px} }

/* Controls */
.controls-row {
  display: flex;
  align-items: center;
  gap: 4px;
  margin-top: 2px;
  flex-wrap: wrap;
}

.ctrl-btn {
  width: 34px; height: 30px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: var(--bg3);
  color: var(--text3);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  transition: all 0.12s;
  flex-shrink: 0;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}

.ctrl-btn:hover { border-color: var(--border2); color: var(--text2); background: var(--bg4); }
.ctrl-btn:active { transform: scale(0.93); }
.ctrl-btn.active { border-color: var(--accent2); color: var(--accent); background: var(--accent-dim); }
.ctrl-btn.stop-btn:hover { border-color: var(--red); color: var(--red); background: var(--red-dim); }

.ctrl-btn svg { width: 12px; height: 12px; fill: currentColor; }

.vol-wrap {
  flex: 1;
  display: flex;
  align-items: center;
  gap: 6px;
  margin-left: 6px;
  min-width: 100px;
}

.vol-icon { color: var(--text3); display: flex; align-items: center; flex-shrink: 0; }
.vol-icon svg { width: 12px; height: 12px; fill: currentColor; }

input[type=range] {
  -webkit-appearance: none;
  flex: 1;
  height: 2px;
  background: var(--border);
  border-radius: 1px;
  outline: none;
  cursor: pointer;
}

input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 14px; height: 14px;
  border-radius: 50%;
  background: var(--text2);
  cursor: pointer;
  transition: all 0.12s;
}

input[type=range]::-webkit-slider-thumb:hover { background: var(--accent); transform: scale(1.2); }

input[type=range]::-moz-range-thumb {
  width: 14px; height: 14px;
  border-radius: 50%;
  background: var(--text2);
  border: none;
  cursor: pointer;
}

.vol-pct {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 9px;
  color: var(--text3);
  width: 28px;
  text-align: right;
  flex-shrink: 0;
}

.hint-row {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  margin-top: 14px;
}

.hint {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 9px;
  color: var(--text3);
  letter-spacing: 0.08em;
  opacity: 0.5;
  transition: opacity 0.3s;
  text-align: center;
}

.left:hover .hint { opacity: 0.8; }

.hint-keys { display: inline; }

/* ── RIGHT ── */
.right { min-width: 0; }

.list-header {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--text3);
  padding-bottom: 14px;
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 8px;
}

.list-header-right {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}

.filter-btn {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.08em;
  color: var(--text3);
  background: none;
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 4px 12px;
  cursor: pointer;
  transition: all 0.12s;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}

.filter-btn:hover { border-color: var(--text2); color: var(--text2); }
.filter-btn.active { border-color: var(--accent2); color: var(--accent); background: var(--accent-dim); }

.search-wrap {
  position: relative;
  margin: 14px 0 6px;
}

.search-wrap input {
  width: 100%;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 12px;
  padding: 10px 14px 10px 34px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--bg2);
  color: var(--text);
  outline: none;
  transition: all 0.2s;
}

.search-wrap input:focus { border-color: var(--accent2); box-shadow: 0 0 0 3px var(--accent-dim); }
.search-wrap input::placeholder { color: var(--text3); }

.search-icon {
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text3);
  pointer-events: none;
}

.search-icon svg { width: 13px; height: 13px; fill: currentColor; }

/* Station rows */
.s-row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 10px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: all 0.12s;
  border-radius: 6px;
  margin: 0 -10px;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}

.s-row:hover {
  background: rgba(197,165,90,0.03);
  padding-left: 14px;
}

.s-row.active {
  background: var(--accent-dim);
  padding-left: 14px;
  border-color: transparent;
}

.s-row.active + .s-row { border-top-color: transparent; }
.s-row.active .s-name { color: var(--accent); font-weight: 600; }
.s-row.disabled { opacity: .2; pointer-events: none; }
.s-row.selected:not(.active) { box-shadow: inset 0 0 0 1px var(--accent2); }
.s-row.hidden { display: none; }

.s-num {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  color: var(--text3);
  width: 20px;
  text-align: right;
  flex-shrink: 0;
  transition: color 0.12s;
}

.s-row.active .s-num { color: var(--accent2); }

.s-logo {
  width: 38px; height: 38px;
  border-radius: 8px;
  object-fit: cover;
  border: 1px solid var(--border);
  background: var(--bg3);
  flex-shrink: 0;
  transition: all 0.12s;
}

.s-row:hover .s-logo { border-color: var(--border2); }
.s-row.active .s-logo { border-color: var(--accent2); box-shadow: 0 0 0 2px var(--accent-dim); }

.s-info { flex: 1; min-width: 0; }

.s-name {
  font-size: 13px;
  font-weight: 500;
  color: var(--text2);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  transition: color 0.12s;
}

.s-row:hover .s-name { color: var(--text); }

.s-meta {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: 3px;
  flex-wrap: wrap;
}

.s-kbps {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 9px;
  color: var(--text3);
}

.s-quality {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 8px;
  padding: 1px 5px;
  border-radius: 3px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
}

.s-quality.hq { background: var(--accent-dim); color: var(--accent2); }
.s-quality.lq { background: rgba(255,255,255,0.03); color: var(--text3); }

.s-live {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 9px;
  color: var(--accent2);
  flex-shrink: 0;
  display: flex; align-items: center; gap: 5px;
  letter-spacing: 0.06em;
}

.s-live::before {
  content: '';
  width: 4px; height: 4px;
  border-radius: 50%;
  background: var(--accent);
  animation: pulse 2s ease-in-out infinite;
}

.s-fav {
  flex-shrink: 0;
  width: 24px; height: 24px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  color: var(--border2);
  transition: all 0.12s;
  -webkit-tap-highlight-color: transparent;
}

.s-fav:hover { color: var(--accent); transform: scale(1.2); }
.s-fav.favorited { color: var(--accent); }
.s-fav svg { width: 12px; height: 12px; fill: currentColor; }

.s-btn {
  width: 32px; height: 32px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: transparent;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  color: var(--text3);
  flex-shrink: 0;
  transition: all .12s;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}

.s-btn:hover { border-color: var(--accent2); color: var(--accent); }
.s-row.active .s-btn { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }

.spin {
  width: 11px; height: 11px;
  border: 1.5px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: sp .6s linear infinite;
}
@keyframes sp { to{transform:rotate(360deg)} }

.no-results {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 12px;
  color: var(--text3);
  text-align: center;
  padding: 40px 0;
  display: none;
}

/* Toast */
.toast {
  position: fixed;
  bottom: 28px;
  left: 50%;
  transform: translateX(-50%) translateY(60px);
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.04em;
  background: var(--bg3);
  color: var(--text);
  padding: 10px 22px;
  border-radius: 8px;
  box-shadow: 0 8px 30px rgba(0,0,0,0.5);
  opacity: 0;
  transition: all 0.25s ease;
  z-index: 100;
  pointer-events: none;
  border: 1px solid var(--border);
  max-width: calc(100vw - 32px);
  text-align: center;
  white-space: nowrap;
}

.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.toast.error { border-color: rgba(196,64,64,0.3); color: #e88; }

/* ── MOBILE PLAYER BAR ── */
.mobile-player {
  display: none;
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  z-index: 50;
  background: var(--bg2);
  border-top: 1px solid var(--border);
  padding: 10px 16px;
  padding-bottom: max(10px, env(safe-area-inset-bottom));
  box-shadow: 0 -4px 20px rgba(0,0,0,0.4);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
}

.mobile-player-inner {
  display: flex;
  align-items: center;
  gap: 10px;
  max-width: 600px;
  margin: 0 auto;
}

.mp-info {
  flex: 1;
  min-width: 0;
}

.mp-name {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  font-weight: 600;
  color: var(--accent);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.mp-name.off { color: var(--text3); }

.mp-status {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 9px;
  color: var(--text3);
  margin-top: 2px;
}

.mp-dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--border);
  flex-shrink: 0;
  transition: all 0.3s;
}

.mp-dot.on { background: var(--accent); box-shadow: 0 0 6px var(--accent); animation: pulse 2.5s ease-in-out infinite; }

.mp-btn {
  width: 36px; height: 36px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: var(--bg3);
  color: var(--text2);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  flex-shrink: 0;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
  transition: all 0.12s;
}

.mp-btn:active { transform: scale(0.9); }
.mp-btn.active { border-color: var(--accent2); color: var(--accent); background: var(--accent-dim); }
.mp-btn svg { width: 14px; height: 14px; fill: currentColor; }

/* ────────────────────────────────────────
   RESPONSIVE BREAKPOINTS
   ──────────────────────────────────────── */

/* Tablet */
@media (max-width: 900px) {
  .page {
    grid-template-columns: 260px 1fr;
    gap: 36px;
    padding: 36px 24px 80px;
  }

  .radio-wrap { max-width: 260px; }
  .status-panel { padding: 14px 16px; gap: 10px; }
  .station-display { font-size: 12px; }
  .s-logo { width: 34px; height: 34px; }
}

/* Small tablet / large phone */
@media (max-width: 700px) {
  .page {
    grid-template-columns: 1fr;
    gap: 24px;
    padding: 20px 16px 100px;
  }

  .left {
    position: static;
    width: 100%;
  }

  .radio-wrap {
    max-width: 240px;
    margin: 0 auto;
  }

  .hint-keys { display: none; }

  .status-panel {
    max-width: 400px;
    margin-left: auto;
    margin-right: auto;
  }

  .hint-row { margin-top: 10px; }

  .mobile-player { display: block; }

  .list-header {
    flex-direction: column;
    align-items: flex-start;
    gap: 10px;
  }

  .list-header-right {
    width: 100%;
    justify-content: space-between;
  }

  .s-row {
    gap: 10px;
    padding: 12px 8px;
    margin: 0 -8px;
  }

  .s-row:hover { padding-left: 8px; }
  .s-row.active { padding-left: 8px; }

  .s-live { display: none; }
}

/* Phone */
@media (max-width: 480px) {
  .page { padding: 16px 12px 100px; }

  .radio-wrap { max-width: 200px; }

  .status-panel { padding: 12px 14px; gap: 8px; border-radius: 10px; }
  .station-display { font-size: 11px; }
  .timer-display { font-size: 9px; }
  .eq-row { height: 18px; }
  @keyframes eq { 0%,100%{height:2px} 50%{height:14px} }

  .controls-row { gap: 3px; }
  .ctrl-btn { width: 30px; height: 28px; border-radius: 5px; }
  .vol-wrap { min-width: 80px; margin-left: 4px; }

  .search-wrap input { font-size: 11px; padding: 8px 12px 8px 30px; }

  .s-row { gap: 8px; padding: 10px 6px; margin: 0 -6px; }
  .s-logo { width: 32px; height: 32px; border-radius: 6px; }
  .s-name { font-size: 12px; }
  .s-kbps { font-size: 8px; }
  .s-num { width: 16px; font-size: 9px; }
  .s-btn { width: 28px; height: 28px; }
  .s-fav { width: 20px; height: 20px; }
  .s-fav svg { width: 10px; height: 10px; }

  .filter-btn { padding: 3px 8px; font-size: 8px; }
  .list-header { font-size: 9px; }

  .hint { font-size: 8px; }
  .toast { font-size: 10px; padding: 8px 16px; bottom: 70px; }
}

/* Very small */
@media (max-width: 360px) {
  .page { padding: 12px 8px 100px; }
  .radio-wrap { max-width: 180px; }
  .s-num { display: none; }
  .s-quality { display: none; }
  .s-fav { width: 18px; height: 18px; }
  .controls-row { justify-content: center; }
  .vol-wrap { min-width: 70px; }
}

/* Landscape phone */
@media (max-height: 500px) and (orientation: landscape) {
  .page {
    grid-template-columns: 200px 1fr;
    gap: 20px;
    padding: 12px 16px 16px;
  }

  .left { position: static; }
  .radio-wrap { max-width: 180px; }
  .hint-row { display: none; }
  .status-panel { padding: 10px 12px; gap: 6px; }
  .station-display { font-size: 11px; }
  .eq-row { height: 16px; }
  .controls-row { gap: 2px; }
  .ctrl-btn { width: 28px; height: 24px; }

  if(state==='off'){
    sL1.textContent='COMEDY RADIO';sL2.textContent='OFF AIR';sL3.textContent='';
    screenGlow.setAttribute('opacity','0');seqBars.forEach(b=>{b.setAttribute('height','2');b.setAttribute('y','10');b.setAttribute('fill','#2a2418')});
    radioSvg.classList.remove('on');sDot.classList.remove('on','loading','error');sLabel.classList.remove('active');sLabel.textContent='SIGNAL';
    sName.textContent='-- OFF AIR --';sName.className='station-display off';eqR.classList.remove('on');lLabel.textContent=`${playable.length} available`;
    svgPI.setAttribute('fill','#555');pLabel.textContent='PLAY';pLabel.setAttribute('fill','#555');fDisp.textContent='88.0 MHz';fDisp.setAttribute('opacity','0.3');fDisp.setAttribute('fill','#2a2418');
    uPP('stopped');cancelAnimationFrame(vuAF);vuB.setAttribute('width','0');vuP.setAttribute('opacity','0');stopTmr()
  }else if(state==='loading'){
    sL1.textContent='TUNING';sL2.textContent=name?name.substring(0,18).toUpperCase():'...';sL3.textContent='CONNECTING';
    screenGlow.setAttribute('opacity','0.2');radioSvg.classList.remove('on');sDot.classList.remove('on','error');sDot.classList.add('loading');
    sLabel.classList.add('active');sLabel.textContent='TUNING';sName.textContent=name||'...';sName.className='station-display loading';
    eqR.classList.remove('on');pLabel.textContent='WAIT';uPP('stopped')
  }else if(state==='on'){
    sL1.textContent='ON AIR';sL2.textContent=name?name.substring(0,18).toUpperCase():'ON AIR';
    const s=cur!==null?stations[cur]:null;sL3.textContent=s?`${s.f} MHz / ${s.b}`:'';
    screenGlow.setAttribute('opacity','0.5');radioSvg.classList.add('on');sDot.classList.remove('loading','error');sDot.classList.add('on');
    sLabel.classList.add('active');sLabel.textContent='LIVE';sName.textContent=name||'On Air';sName.className='station-display';
    eqR.classList.add('on');lLabel.textContent=name||'';svgPI.setAttribute('fill','#c5a55a');pLabel.textContent='LIVE';pLabel.setAttribute('fill','#c5a55a');
    fDisp.textContent=s?`${s.f} MHz`:'-- MHz';fDisp.setAttribute('fill','#c5a55a');fDisp.setAttribute('opacity','0.7');
    uPP('playing');animSEQ();animVU();startTmr();tDisp.classList.add('on')
  }else if(state==='paused'){
    sL1.textContent='PAUSED';sL2.textContent=name?name.substring(0,18).toUpperCase():'PAUSED';sL3.textContent='';
    screenGlow.setAttribute('opacity','0.1');radioSvg.classList.remove('on');sDot.classList.remove('on','loading','error');
    sLabel.classList.add('active');sLabel.textContent='PAUSED';sName.textContent=name||'Paused';sName.className='station-display';
    eqR.classList.remove('on');svgPI.setAttribute('fill','#555');pLabel.textContent='PLAY';pLabel.setAttribute('fill','#555');
    uPP('stopped');cancelAnimationFrame(vuAF);vuB.setAttribute('width','0');vuP.setAttribute('opacity','0');clearInterval(tmr)
  }else if(state==='error'){
    sL1.textContent='ERROR';sL2.textContent='NO SIGNAL';sL3.textContent=name?name.substring(0,18).toUpperCase():'';
    sL1.setAttribute('fill','#c44040');sL2.setAttribute('fill','#c44040');screenGlow.setAttribute('opacity','0');
    sDot.classList.remove('on','loading');sDot.classList.add('error');sLabel.textContent='ERROR';uPP('stopped')
  }
}

let eqTmr=null;
function animSEQ(){clearInterval(eqTmr);eqTmr=setInterval(()=>{if(!isOn){clearInterval(eqTmr);return}seqBars.forEach(b=>{const h=Math.random()*10+1,y=12-h;b.setAttribute('height',h.toFixed(1));b.setAttribute('y',y.toFixed(1));b.setAttribute('fill',h>8?'#c5a55a':'#a88c3a')})},100)}

let selected=null;
function selSt(i){if(selected===i)return;selected=i;document.querySelectorAll('.s-row').forEach(r=>r.classList.remove('selected'));const el=row(i);if(el){el.classList.add('selected');el.scrollIntoView({block:'nearest',behavior:'smooth'});const s=stations[i];if(s&&s.u&&!isOn){sL2.textContent=s.n.substring(0,18).toUpperCase();fDisp.textContent=`${s.f||'--'} MHz`}}}

function animDial(ta){const s=dialAngle;let d=ta-(s%360);if(d>180)d-=360;if(d<-180)d+=360;const t=s+d,dur=500,st=performance.now();function a(tm){const p=Math.min((tm-st)/dur,1),e=1-Math.pow(1-p,3);dialAngle=s+(t-s)*e;dialWheel.style.transform=`rotate(${dialAngle}deg)`;if(p<1)requestAnimationFrame(a)}requestAnimationFrame(a)}

function stopAll(){if(audio){audio.pause();audio.src='';audio=null}if(cur!==null)mA(cur,false);cur=null;isOn=false;clearInterval(eqTmr);cancelAnimationFrame(vuAF);setSS('off');showToast('Stopped')}

function doPlay(i){if(cur===i){isOn?doPause():doResume();return}if(audio){audio.pause();audio.src='';audio=null}if(cur!==null)mA(cur,false);cur=i;isOn=false;const s=stations[i];if(!s.u)return;audio=new Audio(s.u);audio.volume=parseFloat(vol.value);setSS('loading',s.n);mL(i,true);showToast(`Tuning to ${s.n}`);const pI=playable.indexOf(s);if(pI>=0)animDial((pI/playable.length)*360);audio.addEventListener('canplay',()=>{mL(i,false);mA(i,true);isOn=true;setSS('on',s.n);showToast(`Now playing: ${s.n}`)},{once:true});audio.addEventListener('error',()=>{mL(i,false);setSS('error',s.n);showToast(`Connection failed: ${s.n}`,'error');setTimeout(()=>{if(cur===i&&!isOn)setSS('off')},3000)});audio.play().catch(()=>{})}

function doPause(){audio?.pause();isOn=false;clearInterval(eqTmr);cancelAnimationFrame(vuAF);const s=cur!==null?stations[cur]:null;setSS('paused',s?.n);if(cur!==null)mA(cur,false);showToast('Paused')}

function doResume(){audio?.play().catch(()=>{});isOn=true;const s=cur!==null?stations[cur]:null;if(cur!==null)mA(cur,true);setSS('on',s?.n);animSEQ();animVU();if(playStart){clearInterval(tmr);tmr=setInterval(updTmr,1000);tDisp.classList.add('on')}showToast('Resumed')}

vPct.textContent=Math.round(parseFloat(vol.value)*100)+'%';updVI(parseFloat(vol.value));
setTimeout(()=>{sL1.textContent='COMEDY RADIO';sL2.textContent='SELECT STATION';sL3.textContent=`${playable.length} CHANNELS`},600);
setTimeout(()=>{sL3.textContent='';sL2.textContent='OFF AIR'},3200);
</script>
